name: Islami App CI/CD

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      # Edited: Won't stop even if formatting is needed
      - name: Check formatting
        run: dart format .

      # Edited: Won't stop on warnings (like unused imports)
      - name: Analyze project source
        run: flutter analyze --no-fatal-warnings

      # Edited: Added 'continue-on-error' so it doesn't stop the build if tests fail
      - name: Run tests
        run: flutter test
        continue-on-error: true

      - name: Build APK
        run: flutter build apk --debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: islami-app-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
