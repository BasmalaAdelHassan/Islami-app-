name: Islami App CI/CD

# 1. Trigger the workflow on push or pull request to main or master branches
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 2. Pull the code from the repository (Updated to v4)
      - name: Checkout code
        uses: actions/checkout@v4

      # 3. Set up Java environment (Required for Android builds)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      # 4. Set up Flutter environment
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'
          cache: true

      # 5. Fetch project dependencies
      - name: Install dependencies
        run: flutter pub get

      # 6. Verify code formatting (Updated to use dart format)
      - name: Check formatting
        run: dart format .
        
      # 7. Analyze code for potential errors and linting issues
      - name: Analyze project source
        run: flutter analyze --no-fatal-warnings

      # 8. Run unit and widget tests
      - name: Run tests
        run: flutter test

      # 9. Build the Android APK (Debug version for rapid testing)
      - name: Build APK
        run: flutter build apk --debug

      # 10. Upload the generated APK as an artifact (Updated to v4 to fix deprecation)
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: islami-app-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
