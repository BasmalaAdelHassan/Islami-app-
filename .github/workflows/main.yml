name: Islami App CI/CD

# 1. Trigger the workflow on push or pull request to the main branch
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 2. Checkout the code from the repository
      - name: Checkout code
        uses: actions/checkout@v3

      # 3. Setup Java environment (Required for Android builds)
      - name: Set up JDK 11
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '11'

      # 4. Setup Flutter environment
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x' # Uses the latest stable Flutter 3 version
          channel: 'stable'
          cache: true # Caches dependencies to make builds faster

      # 5. Get dependencies
      - name: Install dependencies
        run: flutter pub get

      # 6. Verify formatting (Optional but recommended)
      - name: Check formatting
        run: flutter format --set-exit-if-changed .

      # 7. Analyze the code for errors (Linter)
      - name: Analyze project source
        run: flutter analyze

      # 8. Run Unit and Widget Tests
      - name: Run tests
        run: flutter test

      # 9. Build Android APK (Debug version for testing)
      - name: Build APK
        run: flutter build apk --debug

      # 10. Upload the APK as an artifact (So you can download it from GitHub)
      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: islami-app-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
